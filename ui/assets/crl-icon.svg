<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Warm Brown Circle with subtle depth rim -->
  <circle cx="128" cy="128" r="120" fill="#8A552A"/>
  <circle cx="128" cy="128" r="112" stroke="#6E411C" stroke-width="4" stroke-opacity="0.4"/>
  
  <!-- Integrated CRL "The Resume Loop" Glyph -->
  <!-- One continuous, bold line construction representing the 'C' and the 'R' stem -->
  <path d="
    M 192,192
    A 90,90 0 1 1 192,64
    H 128
    V 192
  " stroke="#F6EFE5" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Overlay for the R-loop and L-foot to create the integrated 'RL' motif -->
  <path d="
    M 128,128
    A 32,32 0 1 1 128,64
    L 180,192
    H 220
  " stroke="#F6EFE5" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent Path: Adds depth and distinguishes the internal 'R' and 'L' structure -->
  <path d="
    M 128,128
    A 32,32 0 1 1 128,64
    L 180,192
    H 220
  " stroke="#D8C1A2" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
