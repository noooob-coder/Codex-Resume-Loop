<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRL Logo - AI 增强和谐版</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --neon-start: #00e676; /* 默认：经典霓虹绿 */
            --neon-end: #00f2ff;   /* 默认：科技青 */
            --accent-glow: rgba(0, 230, 118, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        canvas {
            display: block;
        }

        /* AI 面板样式 */
        .ai-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .ai-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--neon-end);
        }

        .ai-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            color: white;
            margin-bottom: 12px;
            box-sizing: border-box;
            outline: none;
            font-size: 14px;
        }

        .ai-input:focus {
            border-color: var(--neon-start);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: var(--neon-start);
            color: #1a1a1a;
            font-weight: bold;
        }

        .ai-result {
            font-size: 13px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.8);
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            border-radius: 8px;
            border-left: 3px solid var(--neon-end);
        }

        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60% { content: '...'; }
            80%, 100% { content: ''; }
        }

        .label {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            letter-spacing: 5px;
            text-transform: uppercase;
            pointer-events: none;
            user-select: none;
            transition: color 0.5s;
        }
    </style>
</head>
<body>

<div id="container">
    <canvas id="logoCanvas"></canvas>
    <div class="label" id="bottomLabel">CRL SOFTWARE • INTEGRATED SYSTEM ARCHITECTURE</div>

    <!-- AI 交互面板 -->
    <div class="ai-panel">
        <div class="ai-header">Gemini 智能助手</div>
        <input type="text" id="aiPrompt" class="ai-input" placeholder="输入软件描述或风格(如: 医疗软件, 赛博朋克)">
        <div class="button-group">
            <button onclick="generateSlogan()" class="primary">生成标语 ✨</button>
            <button onclick="suggestTheme()">变换配色 ✨</button>
        </div>
        <div id="aiResult" class="ai-result">欢迎使用 CRL 智能助手。输入您的软件描述，让 AI 赋予品牌更多可能性。</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('logoCanvas');
    const ctx = canvas.getContext('2d');
    const apiKey = ""; // 运行时环境将提供 Key
    let width, height, centerX, centerY;
    let time = 0;
    let mouse = { x: 0, y: 0 };
    let targetMouse = { x: 0, y: 0 };

    // 动态色彩状态
    let colors = {
        start: '#00e676',
        end: '#00f2ff',
        glow: 'rgba(0, 230, 118, 0.4)'
    };

    const themeConfig = {
        unitSize: 64,
        strokeWidth: 12,
        radius: 24,
        letterGap: 36
    };

    // --- Gemini API 核心逻辑 ---

    async function callGemini(prompt, isJson = false) {
        const resultEl = document.getElementById('aiResult');
        resultEl.innerHTML = '<span class="loading-dots">AI 思考中</span>';
        
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { 
                parts: [{ text: "你是一个高级品牌设计师。请简洁回答。如果是要求配色，请返回 JSON 格式：{ \"start\": \"#hex\", \"end\": \"#hex\", \"description\": \"理由\" }。" }] 
            }
        };

        if (isJson) {
            payload.generationConfig = {
                responseMimeType: "application/json",
                responseSchema: {
                    type: "OBJECT",
                    properties: {
                        start: { type: "STRING" },
                        end: { type: "STRING" },
                        description: { type: "STRING" }
                    }
                }
            };
        }

        const maxRetries = 5;
        for (let i = 0; i < maxRetries; i++) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('API 调用失败');

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) {
                if (i === maxRetries - 1) {
                    resultEl.innerText = "连接 AI 出错，请稍后再试。";
                    throw error;
                }
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
        }
    }

    async function generateSlogan() {
        const context = document.getElementById('aiPrompt').value || "高质量软件";
        const prompt = `为名为 CRL 的软件生成一个极简、科技感、有力的中文品牌标语。它的背景是：${context}`;
        const slogan = await callGemini(prompt);
        if (slogan) {
            document.getElementById('aiResult').innerText = slogan.trim();
            document.getElementById('bottomLabel').innerText = slogan.trim().toUpperCase();
        }
    }

    async function suggestTheme() {
        const context = document.getElementById('aiPrompt').value || "现代简约";
        const prompt = `为 CRL Logo 设计一套双色渐变配色。风格关键词：${context}。请给出两个互相匹配的科技感 hex 颜色。`;
        const jsonText = await callGemini(prompt, true);
        
        if (jsonText) {
            try {
                const data = JSON.parse(jsonText);
                colors.start = data.start;
                colors.end = data.end;
                colors.glow = `${data.start}66`; // 40% 透明度
                
                // 更新 CSS 变量
                document.documentElement.style.setProperty('--neon-start', data.start);
                document.documentElement.style.setProperty('--neon-end', data.end);
                
                document.getElementById('aiResult').innerHTML = `<strong>应用配色：</strong><br>${data.description}`;
            } catch (e) {
                document.getElementById('aiResult').innerText = "解析配色失败，请重试。";
            }
        }
    }

    // --- Canvas 绘制引擎 ---

    function init() {
        width = window.innerWidth;
        height = window.innerHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        ctx.scale(dpr, dpr);
        centerX = width / 2;
        centerY = height / 2;
    }

    function drawGridBackground() {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = '#2a2a2a';
        const spacing = 30;
        for (let x = 0; x < width; x += spacing) {
            for (let y = 0; y < height; y += spacing) {
                ctx.beginPath();
                ctx.arc(x, y, 0.8, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    function drawRoundedPath(points, r) {
        if (points.length < 2) return;
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length - 1; i++) {
            const p1 = points[i];
            const p2 = points[i + 1];
            ctx.arcTo(p1.x, p1.y, p2.x, p2.y, r);
        }
        ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
    }

    function drawCRL(t) {
        const { unitSize: u, strokeWidth: sw, radius: r, letterGap: g } = themeConfig;
        
        mouse.x += (targetMouse.x - mouse.x) * 0.08;
        mouse.y += (targetMouse.y - mouse.y) * 0.08;
        const driftX = (mouse.x - centerX) * 0.015;
        const driftY = (mouse.y - centerY) * 0.015;

        ctx.save();
        ctx.translate(centerX + driftX, centerY + driftY);

        const pulse = Math.sin(t * 1.5) * 5 + 15;
        ctx.shadowBlur = pulse;
        ctx.shadowColor = colors.glow;
        ctx.lineWidth = sw;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        const grad = ctx.createLinearGradient(-160, 0, 160, 0);
        grad.addColorStop(0, colors.start);
        grad.addColorStop(1, colors.end);
        ctx.strokeStyle = grad;

        // C
        ctx.beginPath();
        const cX = -u * 1.5 - g;
        drawRoundedPath([{x: cX + u, y: -u}, {x: cX, y: -u}, {x: cX, y: u}, {x: cX + u, y: u}], r);
        ctx.stroke();

        // R
        ctx.beginPath();
        const rX = -u / 2;
        ctx.moveTo(rX, u);
        drawRoundedPath([{x: rX, y: u}, {x: rX, y: -u}, {x: rX + u, y: -u}, {x: rX + u, y: 0}, {x: rX, y: 0}], r);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(rX + u * 0.35, 0);
        ctx.lineTo(rX + u, u);
        ctx.stroke();

        // L
        ctx.beginPath();
        const lX = u / 2 + g;
        drawRoundedPath([{x: lX, y: -u}, {x: lX, y: u}, {x: lX + u, y: u}], r);
        ctx.stroke();

        ctx.restore();
    }

    function frame() {
        time += 0.02;
        drawGridBackground();
        ctx.globalAlpha = 0.25;
        ctx.filter = 'blur(12px)';
        drawCRL(time);
        ctx.filter = 'none';
        ctx.globalAlpha = 1.0;
        drawCRL(time);
        requestAnimationFrame(frame);
    }

    window.addEventListener('resize', init);
    window.addEventListener('mousemove', (e) => {
        targetMouse.x = e.clientX;
        targetMouse.y = e.clientY;
    });

    init();
    frame();
</script>
</body>
</html>
